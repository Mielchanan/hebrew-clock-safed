services:
  hebclk:
    build: .
    ports:
      - "8765:8765"
    environment:
      PORT: 8765
      DISPLAY_LAG: 8
      LOG_LEVEL: info
    restart: unless-stopped
    volumes:
      # Mount your motivations.json here to update quotes without rebuild:
      - ./motivations.json:/app/motivations.json:ro
